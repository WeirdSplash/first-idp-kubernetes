# Kind cluster configuration for IDP demo
# Docs: https://kind.sigs.k8s.io/docs/user/configuration/

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: idp-demo

nodes:
  - role: control-plane
    # Port mappings expose services from the cluster to the host
    extraPortMappings:
      # ArgoCD UI (we'll use this later)
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      # Sample application (we'll use this later)
      - containerPort: 30081
        hostPort: 8081
        protocol: TCP
